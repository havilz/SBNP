<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBNP Real-Time Monitoring Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* maritime-dark base */
            color: #475569;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #root {
            width: 100%;
            height: 100%;
        }
        .initial-loader {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(100, 255, 218, 0.1);
            border-top: 3px solid #64ffda; /* maritime-accent */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Rendered while React is loading -->
        <div class="initial-loader">
            <div class="spinner"></div>
            <div style="font-weight: 600; letter-spacing: 1px; font-size: 14px; color: #94a3b8;">
                INISIALISASI SBNP MONITOR...
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
